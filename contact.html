<!DOCTYPE html>
<!-- Моя вторая страница - контакты -->
<html lang="ru">
<head>
    <!-- Мета-теги для поисковиков -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Neonka Салон красоты</title>
    
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Мои стили -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Фоновые элементы -->
    <div class="bg-decorations">
        <div class="bg-element bg-1"></div>
        <div class="bg-element bg-2"></div>
        <div class="bg-element bg-3"></div>
        <div class="bg-element bg-4"></div>
    </div>
    
    <!-- Шапка (такая же как на главной) -->
    <header id="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-spa logo-icon"></i>
                <div class="logo-text">
                    <h1>NEONKA</h1>
                    <p>Салон красоты</p>
                </div>
            </div>
            
            <!-- Меню с активной страницей контактов -->
            <nav class="nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i><span>Главная</span>
                </a>
                <a href="index.html#services" class="nav-link">
                    <i class="fas fa-star"></i><span>Услуги</span>
                </a>
                <a href="index.html#gallery" class="nav-link">
                    <i class="fas fa-images"></i><span>Наши работы</span>
                </a>
                <a href="contacts.html" class="nav-link active">
                    <i class="fas fa-map-marker-alt"></i><span>Контакты</span>
                </a>
            </nav>
            
            <div class="header-right">
                <div class="header-contact">
                    <i class="fas fa-phone-alt phone-icon"></i>
                    <div class="work-hours">9:00 - 21:00</div>
                </div>
                <button class="btn btn-primary header-btn" id="quickBooking">
                    <i class="fas fa-calendar-check"></i>
                    <span>Быстрая запись</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Контент -->
    <main class="main-content">
        <div class="container">
            <!-- Контактная информация -->
            <section class="contacts-section">
                <h3 class="section-title">Наши контакты</h3>
                
                <div class="contacts-wrapper">
                    <!-- Информация -->
                    <div class="contacts-info">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="contact-details">
                                <h4>Адрес салона</h4>
                                <p>г. Шумерля, Карла-Маркса д-15</p>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <div class="contact-details">
                                <h4>Телефон</h4>
                                <a href="tel:+79520295118" class="contact-link">+7 (952) 029-51-18</a>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="contact-details">
                                <h4>График работы</h4>
                                <p>Пн-Вс: 9:00 - 21:00</p>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="contact-details">
                                <h4>Email</h4>
                                <a href="mailto:neonka.salon@mail.ru" class="contact-link">neonka.salon@mail.ru</a>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Форма -->
                    <div class="contacts-form">
                        <h4>Напишите нам</h4>
                        <form class="quick-form" id="quickContactForm">
                            <div class="form-group">
                                <input type="text" id="contactName" placeholder="Ваше имя" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" id="contactPhone" placeholder="+7 (___) ___-__-__" required>
                            </div>
                            <div class="form-group">
                                <textarea id="contactMessage" placeholder="Ваше сообщение" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-paper-plane"></i> Отправить
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Плавающие кнопки -->
    <div class="floating-buttons">
        <button class="floating-btn booking-btn" id="floatingBooking">
            <i class="fas fa-calendar-alt"></i>
            <span class="btn-text">Запись</span>
        </button>
        <a href="tel:+79520295118" class="floating-btn call-btn">
            <i class="fas fa-phone"></i>
            <span class="btn-text">Позвонить</span>
        </a>
        <button class="floating-btn top-btn" id="scrollTop">
            <i class="fas fa-chevron-up"></i>
            <span class="btn-text">Наверх</span>
        </button>
    </div>

    <!-- Футер -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <div class="footer-logo">
                        <i class="fas fa-spa"></i>
                        <h3>NEONKA</h3>
                    </div>
                    <p>Создаем красоту с 2024</p>
                    <div class="social-icons">
                        <a href="#" class="social-icon instagram"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-icon vk"><i class="fab fa-vk"></i></a>
                        <a href="#" class="social-icon telegram"><i class="fab fa-telegram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Модальное окно записи -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-alt"></i>Онлайн запись</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal
